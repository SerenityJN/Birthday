<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday!</title>
  <link rel="stylesheet" href="birthday.css" />
</head>
<body>
  <audio id="bg-music" loop>
    <source src="happybirthdaysong.mp3" type="audio/mpeg" />
  </audio>

  <div id="background"></div>

  <div class="container">
    <div id="tap-to-start">Tap anywhere to start </div>
    <h1 class="title">Happy Birthday Reynalyn</h1>
    

    <div class="cake" id="cake">
      <div class="plate"></div>
      <div class="layer layer-bottom"></div>
      <div class="layer layer-middle"></div>
      <div class="layer layer-top"></div>
      <div class="icing">
        <div class="drip drip1"></div>
        <div class="drip drip2"></div>
        <div class="drip drip3"></div>
      </div>
      <div class="candles">
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
        <div class="candle"><div class="flame"></div></div>
      </div>
    </div>

    <div class="letter hidden" id="letter">
      <div class="envelope">
        <div class="paper">
          <h2>Happy Birthday ! 🎂</h2>
          <p>
              Wishing you all the best things in life and may all your wishes come true.
          </p>
          <p class="signature"></p>
        </div>
      </div>
    </div>

    <button id="btn">Open</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="birthday.js"></script>
</body>
</html>
